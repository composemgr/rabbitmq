# nginx proxy address - http://172.17.0.1:59043


x-logging: &default-logging
  options:
    max-size: '5m'
    max-file: '1'
  driver: json-file

name: rabbitmq
services:
  rabbitmq:
    image: rabbitmq:management
    container_name: rabbitmq-app
    hostname: rabbitmq
    restart: always
    pull_policy: always
    logging: *default-logging
    environment:
      TZ: ${TZ:-America/New_York}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_DEFAULT_VHOST:-/}
      RABBITMQ_DEFAULT_USER: ${DB_ADMIN_NAME:-admin}
      RABBITMQ_DEFAULT_PASS: ${DB_ADMIN_PASS:-changeme_admin_password}
      CONTAINER_NAME: rabbitmq-app
    ports:
      - '1883:1883'
      - '5672:5672'
      - '172.17.0.1:59043:15672'
    volumes:
      - './volumes/data/db/rabbitmq:/var/lib/rabbitmq'
      - './volumes/config/rabbitmq/enabled_plugins:/etc/rabbitmq/enabled_plugins:ro'
    extra_hosts:
      - 'rabbitmq:127.0.0.1'
      - 'host.docker.internal:host-gateway'
    networks:
      - rabbitmq

networks:
  rabbitmq:
    name: rabbitmq
    external: false
